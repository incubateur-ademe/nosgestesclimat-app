name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to redeploy (e.g. 1234)'
        required: true
        type: number

jobs:
  resolve-pr:
    name: Resolve PR info
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
    steps:
      - name: Resolve PR number and head SHA
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

  urls:
    name: Compute preview URLs
    needs: resolve-pr
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    environment: Preview app
    outputs:
      server_url: https://${{ vars.SCALINGO_SERVER_APP_NAME }}-pr${{ needs.resolve-pr.outputs.pr_number }}.osc-fr1.scalingo.io
      site_url: https://${{ vars.SCALINGO_SITE_APP_NAME }}-pr${{ needs.resolve-pr.outputs.pr_number }}.osc-fr1.scalingo.io

    steps:
      - run: echo "Server URL computed"

  ensure-review-apps:
    name: Ensure review apps exist
    needs: resolve-pr
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    environment: Preview app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure server review app exists
        env:
          FGP_DEPLOY_TOKEN: ${{ secrets.FGP_DEPLOY_TOKEN }}
          FGP_DEPLOY_URL: ${{ vars.FGP_DEPLOY_URL }}
          SCALINGO_APP_NAME: ${{ vars.SCALINGO_SERVER_APP_NAME }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
        run: bash .github/scripts/scalingo-ensure-review-app.sh

      - name: Ensure site review app exists
        env:
          FGP_DEPLOY_TOKEN: ${{ secrets.FGP_DEPLOY_TOKEN }}
          FGP_DEPLOY_URL: ${{ vars.FGP_DEPLOY_URL }}
          SCALINGO_APP_NAME: ${{ vars.SCALINGO_SITE_APP_NAME }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
        run: bash .github/scripts/scalingo-ensure-review-app.sh

  deploy-server-preview:
    name: Deploy server preview
    runs-on: ubuntu-latest
    needs: [ensure-review-apps, resolve-pr]
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    environment: Preview app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to Scalingo
        uses: ./.github/actions/deploy-scalingo
        with:
          fgp-deploy-token: ${{ secrets.FGP_DEPLOY_TOKEN }}
          fgp-deploy-url: ${{ vars.FGP_DEPLOY_URL }}
          scalingo-app-name: ${{ vars.SCALINGO_SERVER_APP_NAME }}-pr${{ needs.resolve-pr.outputs.pr_number }}
          git-ref: ${{ needs.resolve-pr.outputs.head_sha }}

  deploy-site-preview:
    name: Deploy site preview
    runs-on: ubuntu-latest
    needs: [ensure-review-apps, resolve-pr, deploy-server-preview]
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    environment:
      name: Preview app
      url: ${{ needs.urls.outputs.site_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to Scalingo
        uses: ./.github/actions/deploy-scalingo
        with:
          fgp-deploy-token: ${{ secrets.FGP_DEPLOY_TOKEN }}
          fgp-deploy-url: ${{ vars.FGP_DEPLOY_URL }}
          scalingo-app-name: ${{ vars.SCALINGO_SITE_APP_NAME }}-pr${{ needs.resolve-pr.outputs.pr_number }}
          git-ref: ${{ needs.resolve-pr.outputs.head_sha }}

  e2e:
    name: Tests on preview
    needs: [deploy-site-preview, deploy-server-preview, urls]
    uses: ./.github/workflows/site:e2e.yaml
    secrets: inherit
    with:
      site_url: ${{ needs.urls.outputs.site_url }}
