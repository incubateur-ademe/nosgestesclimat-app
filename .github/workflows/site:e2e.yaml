name: E2E

on:
  workflow_call:
    inputs:
      site_url:
        type: string
        description: 'URL of the site to test'
        required: true

    secrets:
      MAILISK_API_KEY:
        required: true
        description: 'API key for Mailisk'

env:
  NEXT_PUBLIC_SITE_URL: ${{ inputs.site_url }}

jobs:
  setup:
    runs-on: ubuntu-latest
    environment:
      name: Test E2E
      deployment: false
    name: Setup
    defaults:
      run:
        working-directory: ./apps/site

    steps:
      - uses: actions/checkout@v6

      - name: Setup Playwright and App
        uses: ./.github/actions/setup-playwright

      - name: Run setup tests
        env:
          MAILISK_API_KEY: ${{ secrets.MAILISK_API_KEY }}
          MAILISK_NAMESPACE: ${{ vars.MAILISK_NAMESPACE }}
        run: pnpm playwright test --project="global setup"

      - name: Upload state artifacts
        uses: actions/upload-artifact@v6
        with:
          name: e2e-state
          path: apps/site/e2e/state/*.json
          retention-days: 1

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-setup
          path: apps/site/blob-report
          retention-days: 1

  e2e-tests:
    environment:
      name: Test E2E
      deployment: false

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: Chrome
            browser: chromium
          - project: Firefox
            browser: firefox
          # - project: Mobile Safari
          #   browser: webkit
    runs-on: ubuntu-latest
    name: ${{ matrix.project }}
    needs: [setup]
    defaults:
      run:
        working-directory: ./apps/site

    steps:
      - uses: actions/checkout@v6

      - name: Setup Playwright and App
        uses: ./.github/actions/setup-playwright
        with:
          browser: ${{ matrix.browser }}

      - name: Download state artifacts
        uses: actions/download-artifact@v6
        with:
          name: e2e-state
          path: apps/site/e2e/state

      - name: Run E2E tests (${{ matrix.project }})
        env:
          MAILISK_API_KEY: ${{ secrets.MAILISK_API_KEY }}
          MAILISK_NAMESPACE: ${{ vars.MAILISK_NAMESPACE }}
        run: pnpm playwright test --no-deps --project="${{ matrix.project }}"

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-${{ matrix.project }}
          path: apps/site/blob-report
          retention-days: 1

  merge-reports:
    if: ${{ !cancelled() }}
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    name: Merge reports
    defaults:
      run:
        working-directory: ./apps/site

    steps:
      - uses: actions/checkout@v6

      - name: Download blob reports
        uses: actions/download-artifact@v6
        with:
          path: apps/site/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: apps/site/playwright-report/
          retention-days: 30
