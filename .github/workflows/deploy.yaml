name: Deploy

on:
  push:
    branches:
      - preprod

jobs:
  deploy-preprod:
    name: Deploy to Scalingo (preprod)
    runs-on: ubuntu-latest
    environment: Preprod
    steps:
      - name: Exchange token for Bearer token
        id: get_bearer_token
        run: |
          BEARER_TOKEN=$(curl -s -H "Accept: application/json" -H "Content-Type: application/json" \
            -u ":${{ secrets.SCALINGO_API_TOKEN }}" \
            -X POST https://auth.scalingo.com/v1/tokens/exchange | jq -r '.token')
          echo "::add-mask::$BEARER_TOKEN"
          echo "bearer_token=$BEARER_TOKEN" >> $GITHUB_OUTPUT

      - name: Trigger deployment
        id: trigger_deployment
        run: |
          set -euo pipefail

          BEARER_TOKEN='${{ steps.get_bearer_token.outputs.bearer_token }}'
          if [ -z "$BEARER_TOKEN" ] || [ "$BEARER_TOKEN" = "null" ]; then
            echo "::error::Scalingo bearer token is empty. Check SCALINGO_API_TOKEN secret and token exchange response."
            exit 1
          fi

          API="https://api.osc-fr1.scalingo.com/v1/apps/${{ vars.SCALINGO_APP_NAME }}/deployments"
          PAYLOAD=$(cat <<'JSON'
          {
            "deployment": {
              "git_ref": "preprod",
              "source_url": "https://github.com/${{ github.repository }}/archive/preprod.tar.gz"
            }
          }
          JSON
          )

          # Capture body + status without losing the error details
          HTTP_BODY="$(mktemp)"
          HTTP_CODE=$(curl -sS -o "$HTTP_BODY" -w "%{http_code}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $BEARER_TOKEN" \
            -X POST "$API" \
            -d "$PAYLOAD" || true)

          echo "Scalingo HTTP status: $HTTP_CODE"
          echo "Scalingo response:"
          cat "$HTTP_BODY" || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Failed to trigger Scalingo deployment (HTTP $HTTP_CODE)."
            exit 1
          fi

          DEPLOYMENT_ID=$(jq -r '.deployment.id' < "$HTTP_BODY")
          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" = "null" ]; then
            echo "::error::No deployment.id found in Scalingo response."
            exit 1
          fi

          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Monitor deployment
        run: |
          BEARER_TOKEN="${{ steps.get_bearer_token.outputs.bearer_token }}"
          DEPLOYMENT_ID="${{ steps.trigger_deployment.outputs.deployment_id }}"
          API_URL="https://api.osc-fr1.scalingo.com/v1/apps/${{ vars.SCALINGO_APP_NAME }}/deployments/$DEPLOYMENT_ID"

          PRINTED_LINES=0

          while true; do
            # Get deployment status
            STATUS=$(curl -s -H "Accept: application/json" \
              -H "Authorization: Bearer $BEARER_TOKEN" \
              "$API_URL" | jq -r '.deployment.status')

            # Get deployment logs and print only new lines
            LOGS=$(curl -s -H "Accept: text/plain" \
              -H "Authorization: Bearer $BEARER_TOKEN" \
              "$API_URL/output")

            TOTAL_LINES=$(echo "$LOGS" | wc -l)

            if [ "$TOTAL_LINES" -gt "$PRINTED_LINES" ]; then
              echo "$LOGS" | tail -n +$((PRINTED_LINES + 1))
              PRINTED_LINES=$TOTAL_LINES
            fi

            # Check terminal statuses
            case "$STATUS" in
              success)
                echo "::notice::Deployment completed successfully!"
                exit 0
                ;;
              crashed-error|timeout-error|build-error|aborted)
                echo "::error::Deployment failed with status: $STATUS"
                exit 1
                ;;
            esac

            sleep 10
          done

  e2e-preprod:
    needs: deploy-preprod
    uses: ./.github/workflows/e2e.yaml
    with:
      is_preprod: true
    secrets:
      MAILISK_API_KEY: ${{ secrets.MAILISK_API_KEY }}
