name: Site / Deploy

on:
  push:
    branches: [main]
    paths: [apps/site/**]

jobs:
  deploy-site-preprod:
    name: Deploy site to preprod
    runs-on: ubuntu-latest
    environment: Preprod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to Scalingo
        uses: ./.github/actions/deploy-scalingo
        with:
          scalingo-api-token: ${{ secrets.SCALINGO_API_TOKEN }}
          scalingo-app-name: ${{ vars.SCALINGO_SITE_APP_NAME }}
          git-ref: main
          git-repo: ${{ github.repository }}

  deploy-server-preprod:
    name: Deploy server to preprod
    runs-on: ubuntu-latest
    environment: Preprod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to Scalingo
        uses: ./.github/actions/deploy-scalingo
        with:
          scalingo-api-token: ${{ secrets.SCALINGO_API_TOKEN }}
          scalingo-app-name: ${{ vars.SCALINGO_SERVER_APP_NAME }}
          git-ref: main
          git-repo: ${{ github.repository }}

  e2e-preprod:
    needs: [deploy-site-preprod, deploy-server-preprod]
    uses: ./.github/workflows/e2e.yaml
    with:
      is_preprod: true
    secrets:
      MAILISK_API_KEY: ${{ secrets.MAILISK_API_KEY }}

  deploy-site-prod:
    name: Deploy site to prod
    needs: e2e-preprod
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to Scalingo
        uses: ./.github/actions/deploy-scalingo
        with:
          scalingo-api-token: ${{ secrets.SCALINGO_API_TOKEN }}
          scalingo-app-name: ${{ vars.SCALINGO_SITE_APP_NAME }}
          scalingo-api-host: ${{ vars.SCALINGO_API_HOST }}
          git-ref: main
          git-repo: ${{ github.repository }}

  deploy-server-prod:
    name: Deploy server to prod
    needs: e2e-preprod
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to Scalingo
        uses: ./.github/actions/deploy-scalingo
        with:
          scalingo-api-token: ${{ secrets.SCALINGO_API_TOKEN }}
          scalingo-app-name: ${{ vars.SCALINGO_SITE_SERVER_NAME }}
          scalingo-api-host: ${{ vars.SCALINGO_API_HOST }}
          git-ref: main
          git-repo: ${{ github.repository }}
