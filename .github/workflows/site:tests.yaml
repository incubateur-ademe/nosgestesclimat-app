name: Site / Test

on:
  push:
    branches: [main]
    paths: [apps/site/**]
  pull_request:
    paths: [apps/site/**]

jobs:
  test:
    name: Unit test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests
        run: pnpm test --coverage

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run lint
        run: |
          pnpm next typegen;
          pnpm lint

  type:
    name: Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run typecheck
        run: |
          pnpm next typegen;
          pnpm typecheck

  translations:
    name: Translations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run check
        run: |
          pnpm ui:check
