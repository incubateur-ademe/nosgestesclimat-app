name: E2E

on:
  workflow_call:
    inputs:
      site_url:
        description: 'URL of the site to test'
        required: true
        type: string

env:
  NEXT_PUBLIC_SITE_URL: ${{ inputs.site_url }}

jobs:
  # Setup job - runs on a single machine
  setup:
    # Skip entire workflow if PR is a draft (all other jobs depend on this one)
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    name: Setup
    defaults:
      run:
        working-directory: ./apps/site

    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright
        run: pnpm playwright install chromium

      - name: Run setup tests
        env:
          MAILISK_API_KEY: ${{ secrets.MAILISK_API_KEY }}
          MAILISK_NAMESPACE: ${{ vars.MAILISK_NAMESPACE }}
        run: |
          pnpm playwright test --project="global setup"

      - name: Upload state artifacts
        uses: actions/upload-artifact@v6
        with:
          name: e2e-state
          path: apps/site/e2e/state/*.json
          retention-days: 1

  # Project-based test jobs - runs on 3 machines in parallel
  e2e-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: Chrome
            browser: chromium
          - project: Firefox
            browser: firefox
          - project: Mobile Safari
            browser: webkit
    runs-on: ubuntu-latest
    name: ${{ matrix.project }}
    needs: [setup]
    defaults:
      run:
        working-directory: ./apps/site

    steps:
      - uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright
        run: pnpm playwright install ${{ matrix.browser }} ${{ matrix.browser == 'webkit' && '--with-deps' || '' }}

      - name: Download state artifacts
        uses: actions/download-artifact@v6
        with:
          name: e2e-state
          path: apps/site/e2e/state

      - name: Run E2E tests (${{ matrix.project }})
        env:
          MAILISK_API_KEY: ${{ secrets.MAILISK_API_KEY }}
          MAILISK_NAMESPACE: ${{ vars.MAILISK_NAMESPACE }}
        run: |
          pnpm playwright test --no-deps --project="${{ matrix.project }}"

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: blob-report-${{ matrix.project }}
          path: apps/site/blob-report
          retention-days: 1

  # Merge reports from all shards
  merge-reports:
    if: ${{ !cancelled() && needs.e2e-tests.result != 'skipped' }}
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    name: Merge reports
    defaults:
      run:
        working-directory: ./apps/site

    steps:
      - uses: actions/checkout@v6

      - name: Download blob reports
        uses: actions/download-artifact@v6
        with:
          path: apps/site/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: apps/site/playwright-report/
          retention-days: 30
