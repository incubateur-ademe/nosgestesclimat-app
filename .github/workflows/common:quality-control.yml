name: Quality Control

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality-control:
    name: Quality Control job
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch target branch to detect changed workspaces
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache ESLint
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache/eslint
            apps/*/node_modules/.cache/eslint
            packages/*/node_modules/.cache/eslint
          key: ${{ runner.os }}-eslint-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('eslint.config.js') }}

      - name: Generate types, db client…
        run: pnpm --filter "...[origin/main]" generate

      - name: Lint
        run: pnpm --filter "[origin/main]" lint --cache-strategy content

      - name: Typecheck
        run: pnpm --filter "...[origin/main]" typecheck

      - name: Run unit and integration tests
        run: pnpm --filter "...[origin/main]" test
