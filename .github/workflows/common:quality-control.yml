name: Quality Control

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  NEXT_PUBLIC_SERVER_URL: http://localhost:3001
  NEXT_PUBLIC_SITE_URL: http://localhost:3000

jobs:
  quality-control:
    name: Quality Control job
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch target branch to detect changed workspaces
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup
        uses: ./.github/actions/setup

      - name: Generate types, db client…
        run: pnpm --filter "...[origin/main]" generate

      - name: Lint
        run: pnpm --filter "[origin/main]" lint

      - name: Typecheck
        run: pnpm --filter "...[origin/main]" typecheck

      - name: Build
        run: pnpm --filter "...[origin/main]" build

      - name: Run unit and integration tests
        run: pnpm --filter "...[origin/main]" test --coverage
