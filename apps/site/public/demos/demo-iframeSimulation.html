<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Iframe Simulation</title>
  </head>
  <body>
    <header>
      <h2>
        Exemple d'intégration du test avec région fixée par l'intégrateur.
      </h2>
      <p>
        Ci-dessous, nosgestesclimat.fr intégré comme un iframe paramétré ne
        contenant que la partie simulation du test. Dans cet exemple, la Suisse
        a été définie comme étant la région par défaut du test.
      </p>
    </header>
    <main>
      <iframe
        allow="fullscreen"
        data-iframe="true"
        data-integrator-url="https://energic.io"
        data-lang="en"
        data-only-simulation="true"
        data-share-data="true"
        id="iframeNGC"
        src="https://nosgestesclimat-site-preprod-pr1828.osc-fr1.scalingo.io/en/simulateur/bilan?iframe=true&amp;onlySimulation=true&amp;integratorUrl=https://energic.io&amp;shareData=true"
        style="width: 100%; height: 100%; border: 0px; min-height: 1200px"
        title="Iframe Nos Gestes Climat"></iframe>
    </main>
  </body>
</html>
