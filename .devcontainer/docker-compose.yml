services:
  app:
    image: node:24-alpine
    command: sleep infinity
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ../:/workspaces/nosgestesclimat:cached,z
      - ngc-node-modules:/workspaces/nosgestesclimat/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ngc
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ngc
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  ngc-node-modules:
  postgres-data:
  redis-data:
